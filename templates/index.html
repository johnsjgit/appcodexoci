<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OCI Architect Services</title>
  <style>
    :root {
      color-scheme: light;
      --air: #fcfbfa;
      --bark: #312d2a;
      --oracle-red: #c74634;
      --neutral-1: #f5f4f2;
      --neutral-2: #dfdcd8;
      --neutral-3: #9e9892;
      --neutral-4: #70736e;
      --ocean: #2c5967;
      --ivy: #759c6c;
      --sienna: #ae562c;
      --bg: #fcfbfa;
      --panel: rgba(252, 251, 250, 0.92);
      --panel-strong: rgba(245, 244, 242, 0.98);
      --line: rgba(49, 45, 42, 0.18);
      --line-strong: rgba(49, 45, 42, 0.34);
      --text: #312d2a;
      --muted: #70736e;
      --red: #c74634;
      --cyan: #2c5967;
      --green: #759c6c;
      --yellow: #ae562c;
      --purple: #7b60a8;
      --pink: #c74634;
      --orange: #ae562c;
      --blue: #2c5967;
      --shadow: 0 18px 42px rgba(49, 45, 42, 0.13);
      --deep-ai: #103746;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(ellipse at 8% 0%, rgba(252, 221, 170, 0.86), transparent 20%),
        radial-gradient(ellipse at 20% 3%, rgba(255, 150, 126, 0.58), transparent 21%),
        radial-gradient(ellipse at 91% 18%, rgba(213, 219, 168, 0.54), transparent 24%),
        radial-gradient(ellipse at 82% 78%, rgba(117, 156, 108, 0.34), transparent 28%),
        linear-gradient(135deg, #f8f4ee 0%, #dce8e6 36%, #cbdedb 62%, #edf0eb 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 6% 0%, rgba(252, 251, 250, 0.76), transparent 18%),
        radial-gradient(ellipse at 17% 2%, rgba(199, 70, 52, 0.20), transparent 15%),
        radial-gradient(ellipse at 92% 14%, rgba(117, 156, 108, 0.20), transparent 20%),
        linear-gradient(180deg, rgba(252, 251, 250, 0.28), rgba(252, 251, 250, 0.54));
      opacity: 1;
    }

    body::after {
      content: "ORACLE AI";
      position: fixed;
      left: 64%;
      top: 136px;
      z-index: 0;
      pointer-events: none;
      transform: translateX(-50%);
      color: rgba(49, 45, 42, 0.08);
      font-size: clamp(62px, 8vw, 116px);
      line-height: 1;
      font-weight: 300;
      letter-spacing: 0.12em;
      white-space: nowrap;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1520px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 30px 0 28px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: center;
      margin-bottom: 18px;
      min-width: 0;
    }

    .hero > * { min-width: 0; }

    h1 {
      margin: 0;
      font-size: clamp(38px, 5vw, 68px);
      line-height: 0.95;
      letter-spacing: 0;
      font-weight: 950;
      color: var(--bark);
      text-shadow: 0 8px 24px rgba(252, 251, 250, 0.44);
    }

    h1 span { color: var(--oracle-red); }

    .oracle-mark {
      justify-self: end;
      align-self: center;
      text-align: center;
      color: var(--bark);
      font-weight: 900;
      letter-spacing: 0;
    }

    .oracle-mark strong {
      display: block;
      color: var(--oracle-red);
      font-size: 38px;
      line-height: 1;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(260px, 480px);
      gap: 12px;
      margin-bottom: 18px;
      min-width: 0;
    }

    .controls > * { min-width: 0; }

    .search-wrap {
      position: relative;
      width: 100%;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      width: 18px;
      height: 18px;
      color: var(--ocean);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .search {
      width: 100%;
      height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(252, 251, 250, 0.95);
      color: var(--text);
      padding: 0 14px 0 43px;
      font-size: 15px;
      outline: none;
      box-shadow: 0 12px 28px rgba(15, 52, 65, 0.16);
    }

    .search::placeholder { color: var(--neutral-4); }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 0.88fr) minmax(460px, 0.62fr);
      gap: 20px;
      align-items: start;
    }

    .service-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .category-card {
      min-height: 205px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(252, 251, 250, 0.96), rgba(245, 244, 242, 0.90));
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
      padding: 17px;
      transition: border-color 0.18s ease, transform 0.18s ease, background 0.18s ease;
    }

    .category-card:hover {
      border-color: var(--line-strong);
      transform: translateY(-1px);
    }

    .category-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .category-icon {
      width: 34px;
      height: 34px;
      border: 2px solid currentColor;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-weight: 950;
      font-size: 14px;
    }

    .category-title {
      margin: 0;
      color: var(--category-color);
      font-size: 17px;
      line-height: 1.12;
      font-weight: 900;
    }

    .service-list {
      display: grid;
      gap: 5px;
    }

    .service-button {
      display: grid;
      grid-template-columns: 10px 1fr;
      gap: 7px;
      width: 100%;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--text);
      padding: 4px 5px;
      text-align: left;
      cursor: pointer;
      font-size: 13px;
      line-height: 1.25;
      font-weight: 620;
    }

    .service-button::before {
      content: "";
      width: 4px;
      height: 4px;
      margin-top: 7px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.82;
    }

    .service-button:hover,
    .service-button.active {
      color: var(--category-color);
      background: rgba(44, 89, 103, 0.10);
    }

    .detail-panel {
      position: sticky;
      top: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(252, 251, 250, 0.97), rgba(245, 244, 242, 0.94));
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .detail-top {
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }

    .detail-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .detail-title {
      margin: 8px 0 0;
      color: var(--active-color, var(--cyan));
      font-size: 34px;
      line-height: 1.05;
      font-weight: 950;
    }

    .detail-body {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .detail-section h3 {
      margin: 0 0 7px;
      color: var(--text);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .detail-section p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .mind-map {
      position: relative;
      height: 370px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(44, 89, 103, 0.08), transparent),
        rgba(252, 251, 250, 0.72);
      overflow: hidden;
    }

    .mind-map svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .map-node {
      position: absolute;
      display: grid;
      place-items: center;
      width: 94px;
      min-height: 42px;
      padding: 7px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--air);
      color: var(--text);
      text-align: center;
      font-size: 11px;
      line-height: 1.15;
      font-weight: 850;
      transform: translate(-50%, -50%);
    }

    .map-node.center {
      width: 128px;
      min-height: 58px;
      border-color: var(--active-color, var(--cyan));
      color: var(--active-color, var(--cyan));
      background: var(--panel-strong);
      font-size: 13px;
    }

    .architecture-flow {
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(44, 89, 103, 0.08), transparent),
        rgba(252, 251, 250, 0.78);
      padding: 12px;
      overflow: hidden;
    }

    .arch-canvas {
      position: relative;
      min-height: 285px;
    }

    .arch-canvas svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .arch-node {
      position: absolute;
      display: grid;
      place-items: center;
      width: 118px;
      min-height: 48px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(252, 251, 250, 0.94);
      color: var(--text);
      text-align: center;
      font-size: 11px;
      line-height: 1.15;
      font-weight: 850;
      transform: translate(-50%, -50%);
      box-shadow: 0 10px 22px rgba(49, 45, 42, 0.08);
    }

    .arch-node.core {
      width: 142px;
      min-height: 58px;
      border-color: var(--active-color, var(--oracle-red));
      background: rgba(199, 70, 52, 0.10);
      color: var(--active-color, var(--oracle-red));
      font-size: 12px;
    }

    .arch-node.external {
      border-color: rgba(117, 156, 108, 0.62);
      background: rgba(117, 156, 108, 0.12);
    }

    .architecture-flow h3 {
      margin: 0 0 9px;
      color: var(--text);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .architecture-flow p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.48;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .meta-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(252, 251, 250, 0.76);
      padding: 11px;
    }

    .meta-card strong {
      display: block;
      margin-bottom: 5px;
      color: var(--active-color, var(--cyan));
      font-size: 12px;
      text-transform: uppercase;
    }

    .meta-card span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 9px;
      color: var(--text);
      background: rgba(44, 89, 103, 0.08);
      font-size: 12px;
      font-weight: 800;
    }

    .innovation-strip {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(252, 251, 250, 0.92);
      backdrop-filter: blur(8px);
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }

    .innovation-strip h2 {
      margin: 0 0 12px;
      color: var(--oracle-red);
      font-size: 18px;
    }

    .innovation-list {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
    }

    .innovation {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px;
      background: var(--air);
      color: var(--text);
      font-size: 12px;
      line-height: 1.3;
      font-weight: 750;
    }

    .innovation strong {
      display: block;
      margin-bottom: 3px;
      color: var(--cyan);
      font-size: 13px;
    }

    .empty {
      grid-column: 1 / -1;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
      background: var(--panel);
      color: var(--muted);
      font-weight: 800;
    }

    @media (max-width: 1180px) {
      .layout { grid-template-columns: 1fr; }
      .detail-panel { position: relative; top: 0; }
      .service-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .innovation-list { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    @media (max-width: 820px) {
      .page { width: min(720px, calc(100vw - 22px)); padding-top: 22px; }
      .hero { grid-template-columns: 1fr; }
      h1 { font-size: clamp(31px, 10vw, 42px); line-height: 1.02; }
      .oracle-mark { justify-self: start; text-align: left; }
      .controls { grid-template-columns: 1fr; }
      .service-grid { grid-template-columns: 1fr; }
      .innovation-list { grid-template-columns: 1fr; }
      .category-card { min-height: auto; }
      .mind-map { height: 340px; }
      .meta-grid { grid-template-columns: 1fr; }
      .arch-canvas { min-height: 360px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero">
      <div>
        <h1><span>OCI</span> ARCHITECT SERVICES</h1>
      </div>
      <div class="oracle-mark">
        <strong>ORACLE</strong>
        Cloud Infrastructure
      </div>
    </header>

    <section class="controls" aria-label="Filtros de servicios">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"></circle>
          <path d="m16.2 16.2 4.3 4.3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
        </svg>
        <input class="search" id="search" type="search" placeholder="Buscar producto OCI, dominio o caso de uso">
      </div>
    </section>

    <main class="layout">
      <section class="service-grid" id="serviceGrid" aria-label="Catalogo de servicios OCI"></section>

      <aside class="detail-panel" id="detailPanel" aria-live="polite">
        <div class="detail-top">
          <div class="detail-label" id="detailCategory">AI & Machine Learning</div>
          <h2 class="detail-title" id="detailTitle">OCI Generative AI</h2>
        </div>
        <div class="detail-body">
          <div class="mind-map" id="mindMap"></div>
          <div class="architecture-flow">
            <h3>Arquitectura integrada</h3>
            <div class="arch-canvas" id="architectureFlow"></div>
            <p id="architectureNarrative"></p>
          </div>
          <div class="detail-section">
            <h3>Qué es</h3>
            <p id="detailDescription"></p>
          </div>
          <div class="detail-section">
            <h3>Modelo de ejecución e integración externa</h3>
            <div class="meta-grid">
              <div class="meta-card"><strong>Modelo</strong><span id="runModel"></span></div>
              <div class="meta-card"><strong>Integración externa</strong><span id="externalModel"></span></div>
            </div>
          </div>
          <div class="detail-section">
            <h3>Caso de uso en arquitectura OCI</h3>
            <p id="detailUseCase"></p>
          </div>
          <div class="detail-section">
            <h3>Se integra con</h3>
            <div class="pill-row" id="integrationPills"></div>
          </div>
        </div>
      </aside>
    </main>

    <section class="innovation-strip">
      <h2>Recently Launched & Key Innovations</h2>
      <div class="innovation-list" id="innovations"></div>
    </section>
  </div>

  <script>
    const categories = [
      { id: "compute", title: "Compute", icon: "CPU", color: "#2c5967", services: ["OCI Compute (VM & Bare Metal)", "Flexible Shapes (E4, E5, Ampere A1)", "GPU & HPC Instances", "Autoscaling", "Instance Pools", "Capacity Reservations", "Preemptible Instances", "Container Instances", "Batch"] },
      { id: "containers", title: "Containers & Kubernetes", icon: "OKE", color: "#2c5967", services: ["OKE (Managed Kubernetes)", "OCIR (Container Registry)", "Artifact Registry", "Virtual Nodes (Serverless)", "Kubernetes Add-ons", "Service Mesh", "DevOps Integration"] },
      { id: "database", title: "Database & Data Management", icon: "DB", color: "#ae562c", services: ["Autonomous Database (ATP, ADW)", "Oracle Database 23ai", "Exadata Database Service", "Exadata Cloud@Customer", "Base Database Service", "MySQL HeatWave", "NoSQL Database", "PostgreSQL (Managed)", "Database Migration", "Recovery Service", "Data Safe", "Database Tools"] },
      { id: "storage", title: "Storage", icon: "STO", color: "#759c6c", services: ["Object Storage", "Block Volume", "File Storage (FSS)", "Archive Storage", "Backup Service", "Replication (Cross-Region)", "Data Lifecycle Policies", "Storage Gateway"] },
      { id: "networking", title: "Networking & Edge", icon: "NET", color: "#2c5967", services: ["VCN", "Subnets (Public / Private)", "Load Balancer (L7 & L4)", "Network Load Balancer", "DNS & Traffic Management", "FastConnect", "VPN (IPSec)", "DRG", "NAT Gateway", "Service Gateway", "Internet Gateway", "CDN", "Network Firewall"] },
      { id: "integration", title: "Integration & Messaging", icon: "INT", color: "#ae562c", services: ["API Gateway", "Service Connector Hub", "Streaming (Kafka-Compatible)", "Events", "Notifications", "Queue", "Functions", "Oracle Integration Cloud (OIC)", "Email Delivery"] },
      { id: "analytics", title: "Analytics & Data Platform", icon: "ANA", color: "#c74634", services: ["Oracle Analytics Cloud (OAC)", "Autonomous Data Warehouse", "Data Integration", "Data Flow (Spark)", "GoldenGate", "OpenSearch", "Data Catalog", "OCI Data Lakehouse"] },
      { id: "ai", title: "Analytics and AI", icon: "AI", color: "#c74634", services: ["OCI Generative AI", "OCI Generative AI Agents", "AI Services (Vision, Language, Speech, Document Understanding)", "Data Science (Notebooks, Jobs)", "Model Deployment & Endpoints", "AI Infrastructure (GPU: H100, A100)", "Vector Search"] },
      { id: "developer", title: "Application Development", icon: "DEV", color: "#759c6c", services: ["OCI DevOps (CI/CD)", "Resource Manager (Terraform)", "Cloud Shell", "SDKs & CLI", "APEX Application Development", "Visual Builder", "Application Dependency Management"] },
      { id: "observability", title: "Observability & Management", icon: "OBS", color: "#2c5967", services: ["Monitoring & Alarms", "Logging", "Logging Analytics", "Notifications", "Operations Insights", "Application Performance Monitoring", "Stack Monitoring", "Health Checks", "Cloud Advisor"] },
      { id: "governance", title: "Governance & Administration", icon: "GOV", color: "#ae562c", services: ["Compartments", "Policies", "Tagging", "Limits & Quotas", "Organizations (Tenancy Structure)", "Cost Tracking & Reporting", "Budgets", "Resource Scheduler"] },
      { id: "frontend", title: "Front-End & Experience", icon: "WEB", color: "#312d2a", services: ["API Gateway", "WAF", "DNS", "Content Management", "Digital Assistant", "Visual Builder", "APEX Application Development"] },
      { id: "migration", title: "Migration, Hybrid & Multicloud", icon: "MIG", color: "#2c5967", services: ["Database Migration", "GoldenGate", "Data Transfer Service", "Data Sync", "Zero Downtime Migration (ZDM)", "Cloud@Customer (Exadata & Compute)", "Oracle Database@Azure", "Oracle Database@Google Cloud", "Oracle Database@AWS"] },
      { id: "media", title: "Media Services", icon: "MED", color: "#c74634", services: ["Media Flow", "Media Streams", "Content Delivery (via CDN)"] },
      { id: "serverless", title: "Serverless & Event-Driven", icon: "EVT", color: "#759c6c", services: ["Functions", "Events", "API Gateway", "Queue", "Streaming", "Autonomous DB (Serverless)", "OKE Virtual Nodes", "Container Instances"] },
      { id: "resilience", title: "Resilience & DR", icon: "DR", color: "#2c5967", services: ["Multi-AD / Multi-Region", "Cross-Region Replication", "Autonomous DB Data Guard", "Block Volume Replication", "Object Storage Replication", "Traffic Steering (Failover)", "Backup Policies", "Full Stack Disaster Recovery"] }
    ];

    const securityServices = {
      id: "security",
      title: "Security & Trust",
      icon: "SEC",
      color: "#312d2a",
      services: ["Identity & Access (IAM)", "Cloud Guard", "Vault", "WAF", "Shield (DDoS Protection)", "Bastion", "Security Zones", "Data Safe", "Vulnerability Scanning", "Certificates Service", "Audit", "Compliance", "Threat Intelligence"]
    };

    const detailOverrides = {
      "OCI Compute (VM & Bare Metal)": ["Servicio para ejecutar cargas en maquinas virtuales o bare metal con formas flexibles.", "Ejecutar servidores de aplicacion en subnets privadas, detras de Load Balancer, con logs hacia Logging y politicas IAM."],
      "OKE (Managed Kubernetes)": ["Kubernetes administrado por OCI para desplegar microservicios y plataformas cloud native.", "Publicar una arquitectura de microservicios con API Gateway, OCIR, Load Balancer, Vault, Logging y autoscaling."],
      "Autonomous Database (ATP, ADW)": ["Base de datos autonoma que automatiza parches, backups, tuning y escalamiento.", "Crear una capa transaccional o analitica para una app web, conectada por private endpoint, con Data Safe y backups."],
      "Object Storage": ["Almacenamiento de objetos duradero para datos, imagenes, backups, logs y datasets.", "Guardar documentos para RAG, backups de base de datos, imagenes de aplicaciones y archivos historicos con lifecycle policies."],
      "VCN": ["Red virtual aislada donde se organizan subnets, gateways, rutas y controles de seguridad.", "Diseñar una landing zone con subnets publicas/privadas, NAT, Service Gateway, DRG y Network Security Groups."],
      "Load Balancer (L7 & L4)": ["Balancea trafico entre backends y puede terminar TLS en arquitecturas de alta disponibilidad.", "Exponer una aplicacion en varias instancias o pods OKE con health checks, certificados y WAF delante."],
      "API Gateway": ["Entrada administrada para APIs HTTP con rutas, autenticacion, throttling y observabilidad.", "Publicar APIs serverless con Functions, protegerlas con IAM/WAF y enviar eventos a Streaming o Queue."],
      "Streaming (Kafka-Compatible)": ["Servicio de mensajeria para ingesta de eventos y pipelines compatibles con Kafka.", "Procesar telemetria en tiempo real desde aplicaciones, integrarla con Functions, Data Flow y Autonomous Database."],
      "OCI Generative AI": ["Servicio administrado para usar modelos fundacionales, embeddings y capacidades generativas.", "Crear un asistente empresarial con RAG usando Object Storage, Vector Search, API Gateway, Vault y Logging."],
      "Vector Search": ["Capacidad de busqueda semantica basada en embeddings para encontrar contenido por significado.", "Implementar RAG en Oracle Database 23ai, guardando chunks y vectores para recuperar contexto antes de llamar al LLM."],
      "Data Science (Notebooks, Jobs)": ["Entorno administrado para notebooks, jobs, modelos y despliegues de machine learning.", "Entrenar modelos con datos en Object Storage, registrar artefactos y exponer inferencia con Model Deployment."],
      "Cloud Guard": ["Servicio de postura de seguridad que detecta configuraciones riesgosas y actividad sospechosa.", "Monitorear compartments de produccion, generar problemas de seguridad y activar remediaciones automatizadas."],
      "Vault": ["Gestiona llaves de cifrado y secretos para aplicaciones y servicios OCI.", "Guardar credenciales de base de datos y API keys usadas por Compute, OKE o Functions sin poner secretos en codigo."],
      "Data Safe": ["Servicio para evaluar seguridad, usuarios, actividad y datos sensibles en Oracle Database.", "Auditar Autonomous Database, detectar datos sensibles y monitorear usuarios privilegiados."],
      "Resource Manager (Terraform)": ["Servicio administrado para ejecutar Terraform y gobernar infraestructura como codigo.", "Crear ambientes repetibles de red, compute, database y seguridad con aprobaciones y estado centralizado."],
      "Monitoring & Alarms": ["Recolecta metricas y dispara alarmas sobre recursos y aplicaciones.", "Alertar por CPU alta, errores de API, latencia de Load Balancer o consumo de base de datos."],
      "Cost Tracking & Reporting": ["Uso de tags, reportes y analisis de costos para controlar gasto por equipo o aplicacion.", "Aplicar tags obligatorios por owner/proyecto y revisar costos mensuales por servicio, region y compartment."],
      "Cloud Advisor": ["Recomendaciones para optimizar costo, seguridad, disponibilidad y performance.", "Identificar recursos sobredimensionados, volumenes sin uso y mejoras de alta disponibilidad."],
      "WAF": ["Proteccion de aplicaciones web contra ataques comunes, bots y reglas personalizadas.", "Proteger una app publica detras de Load Balancer o API Gateway con reglas OWASP y listas de control."],
      "Bastion": ["Acceso SSH/RDP temporal y controlado a recursos privados sin exponerlos a Internet.", "Administrar instancias en subnets privadas con sesiones auditables y permisos de minimo privilegio."],
      "GoldenGate": ["Replica e integra datos en tiempo real entre bases y plataformas heterogeneas.", "Sincronizar bases on-premises con Autonomous Database para migracion, analytics o modernizacion."],
      "Visual Builder": ["Plataforma low-code para crear aplicaciones web y moviles conectadas a servicios.", "Crear rapidamente una app interna conectada a APIs, Autonomous Database e Identity."],
      "Blockchain": ["Plataforma administrada para redes blockchain empresariales.", "Registrar eventos confiables de cadena de suministro o auditoria entre varias organizaciones."]
    };

    const categoryTemplates = {
      compute: ["Capacidad de computo para ejecutar aplicaciones, servicios y cargas especializadas.", "Ejecutar backends escalables en subnets privadas con balanceo, observabilidad y politicas de seguridad."],
      containers: ["Servicios para empaquetar, desplegar y operar aplicaciones en contenedores.", "Modernizar aplicaciones en microservicios con pipelines DevOps, registro OCIR y observabilidad centralizada."],
      database: ["Servicios de base de datos para transacciones, analitica, NoSQL y administracion.", "Persistir datos de negocio con backup, seguridad, replica y monitoreo gestionado."],
      storage: ["Servicios para almacenar objetos, bloques, archivos y copias de seguridad.", "Crear una capa de datos duradera para aplicaciones, analitica, backups y recuperacion ante desastres."],
      networking: ["Servicios de conectividad, entrada, salida y control de trafico.", "Conectar usuarios, aplicaciones y redes on-premises con segmentacion, rutas y alta disponibilidad."],
      integration: ["Servicios para conectar aplicaciones mediante APIs, eventos y mensajeria.", "Desacoplar productores y consumidores con eventos, colas, funciones y conectores."],
      analytics: ["Servicios para integrar, procesar, buscar y visualizar datos.", "Construir una plataforma de datos desde ingesta hasta dashboards ejecutivos y busqueda operacional."],
      ai: ["Servicios para IA generativa, machine learning, modelos y busqueda semantica.", "Crear productos inteligentes con embeddings, modelos, endpoints y controles de seguridad."],
      developer: ["Herramientas para construir, desplegar y operar software en OCI.", "Automatizar CI/CD, infraestructura como codigo y diagnostico de aplicaciones."],
      observability: ["Servicios para medir salud, logs, trazas, rendimiento y operacion.", "Detectar incidentes rapidamente y correlacionar metricas de aplicaciones, red y base de datos."],
      governance: ["Controles para organizar, proteger y administrar recursos del tenancy.", "Definir landing zones, ownership, tagging, limites y reportes de costos."],
      frontend: ["Servicios para construir experiencias web, APIs publicas y asistentes digitales.", "Publicar frontends seguros con DNS, WAF, APIs y servicios low-code."],
      migration: ["Servicios para migrar datos, bases y aplicaciones hacia OCI o ambientes hibridos.", "Reducir riesgo de migracion con replicas, transferencia de datos y planes por oleadas."],
      media: ["Servicios para procesar, empaquetar y distribuir contenido multimedia.", "Crear flujos de video bajo demanda con procesamiento y entrega global mediante CDN."],
      serverless: ["Servicios event-driven que ejecutan codigo y procesos sin administrar servidores.", "Responder a eventos de datos, APIs o colas con Functions y servicios administrados."],
      resilience: ["Servicios y patrones para continuidad, replicacion y recuperacion ante fallos.", "Diseñar aplicaciones multi-AD o multi-region con failover, backup y replica cruzada."],
      security: ["Servicios de identidad, postura, proteccion, cifrado y auditoria.", "Aplicar defensa en profundidad con IAM, Vault, Cloud Guard, WAF, Bastion y Audit."]
    };

    const commonIntegrations = {
      compute: ["VCN", "Load Balancer", "Block Volume", "Monitoring & Alarms", "Logging", "Vault"],
      containers: ["OCIR", "Load Balancer", "Vault", "Monitoring & Alarms", "Logging", "DevOps Integration"],
      database: ["VCN", "Data Safe", "Vault", "Backup Service", "GoldenGate", "Monitoring & Alarms"],
      storage: ["Data Lifecycle Policies", "Replication (Cross-Region)", "Service Gateway", "Data Flow (Spark)", "Cloud Guard", "IAM"],
      networking: ["IAM", "Cloud Guard", "WAF", "DNS & Traffic Management", "FastConnect", "Monitoring & Alarms"],
      integration: ["Functions", "Events", "Queue", "Streaming (Kafka-Compatible)", "Logging", "IAM"],
      analytics: ["Object Storage", "Autonomous Data Warehouse", "Data Integration", "GoldenGate", "OpenSearch", "Data Science"],
      ai: ["Object Storage", "Vector Search", "Data Science", "API Gateway", "Vault", "Logging"],
      developer: ["Resource Manager (Terraform)", "OCI DevOps (CI/CD)", "Cloud Shell", "SDKs & CLI", "Logging", "Monitoring & Alarms"],
      observability: ["Logging", "Monitoring & Alarms", "Notifications", "Operations Insights", "APM & Logging Analytics", "Cloud Advisor"],
      governance: ["Compartments", "Policies", "Tagging", "Limits & Quotas", "Cost Tracking & Reporting", "Cloud Advisor"],
      frontend: ["DNS", "WAF", "API Gateway", "Visual Builder", "Digital Assistant", "Content Management"],
      migration: ["FastConnect", "VPN (IPSec)", "Database Migration", "GoldenGate", "Object Storage", "Zero Downtime Migration (ZDM)"],
      media: ["Object Storage", "Content Delivery (via CDN)", "Media Flow", "Media Streams", "DNS", "WAF"],
      serverless: ["Functions", "Events", "API Gateway", "Queue", "Streaming", "Autonomous DB (Serverless)"],
      resilience: ["Multi-AD / Multi-Region", "Cross-Region Replication", "Traffic Steering (Failover)", "Backup Policies", "Object Storage Replication", "Autonomous DB Data Guard"],
      security: ["Identity & Access (IAM)", "Vault", "Cloud Guard", "Audit", "Bastion", "Security Zones"]
    };

    const innovations = [
      ["OCI Generative AI", "LLMs, embeddings & more"],
      ["OCI PostgreSQL", "Fully managed service"],
      ["HeatWave Lakehouse", "Real-time lakehouse analytics"],
      ["OKE Virtual Nodes", "Serverless Kubernetes"],
      ["GPU Clusters (H100)", "Massively scalable AI"],
      ["Multicloud Expansion", "Azure & beyond"]
    ];

    let selectedService = "OCI Generative AI";

    const allCategories = [...categories, securityServices];
    const serviceToCategory = new Map();
    allCategories.forEach((category) => category.services.forEach((service) => serviceToCategory.set(service, category)));

    const $ = (id) => document.getElementById(id);

    function getDetails(service) {
      const category = serviceToCategory.get(service) || categories[0];
      const template = categoryTemplates[category.id] || categoryTemplates.compute;
      const override = detailOverrides[service] || [];
      const integrations = commonIntegrations[category.id] || commonIntegrations.compute;
      const model = getIntegrationModel(service, category);
      return {
        category,
        description: override[0] || `${service} forma parte del dominio ${category.title}. ${template[0]}`,
        useCase: override[1] || template[1],
        integrations: Array.from(new Set([...(integrations || []), ...category.services.filter((item) => item !== service).slice(0, 3)])).slice(0, 8),
        runModel: model.runModel,
        externalModel: model.externalModel,
        architectureNarrative: model.architectureNarrative
      };
    }

    function getIntegrationModel(service, category) {
      const nativeDatabase = ["Autonomous Database (ATP, ADW)", "Oracle Database 23ai", "Exadata Database Service", "Base Database Service", "NoSQL Database", "PostgreSQL (Managed)", "MySQL HeatWave"];
      const multicloud = ["Oracle Database@Azure", "Oracle Database@Google Cloud", "Oracle Database@AWS"];
      const hybrid = ["Exadata Cloud@Customer", "Cloud@Customer (Exadata & Compute)", "FastConnect", "VPN (IPSec)", "GoldenGate", "Data Transfer Service", "Storage Gateway"];
      const openIntegration = ["API Gateway", "Streaming (Kafka-Compatible)", "Queue", "Events", "Functions", "Service Connector Hub", "Oracle Integration Cloud (OIC)", "GoldenGate", "Load Balancer (L7 & L4)", "Network Load Balancer", "DNS & Traffic Management", "WAF", "Object Storage"];

      if (service === "Autonomous Database (ATP, ADW)") {
        return {
          runModel: "Servicio administrado nativo de OCI. No se instala manualmente como software sobre IaaS; Oracle opera parches, backups, escalamiento y alta disponibilidad.",
          externalModel: "Aplicaciones externas, on-premises o multicloud pueden conectarse por red privada, VPN, FastConnect, endpoints, wallets y APIs, pero la plataforma autonoma corre como servicio administrado.",
          architectureNarrative: "Usuarios y APIs entran por DNS, WAF y Load Balancer/API Gateway; la aplicacion corre en Compute, OKE o Functions; Autonomous Database conserva los datos y se protege con Vault, Data Safe, backups y observabilidad."
        };
      }

      if (multicloud.includes(service)) {
        return {
          runModel: "Servicio Oracle Database entregado en una nube externa soportada, operado por Oracle con integracion nativa hacia OCI y el proveedor cloud correspondiente.",
          externalModel: "Diseñado para arquitecturas multicloud: aplicaciones en Azure, Google Cloud o AWS pueden usar la base Oracle con baja latencia y gobierno Oracle.",
          architectureNarrative: "La aplicacion puede vivir fuera de OCI, consumir datos Oracle en el proveedor externo y sincronizar identidad, red, observabilidad o datos hacia OCI segun el patron."
        };
      }

      if (hybrid.includes(service)) {
        return {
          runModel: "Servicio para arquitectura hibrida: conecta OCI con data centers, sedes o nubes externas.",
          externalModel: "Se integra con sistemas externos por enlaces privados, VPN, replicas de datos, transferencia o conectores administrados.",
          architectureNarrative: "El servicio actua como puente entre la capa externa y OCI, permitiendo migracion, continuidad operativa, replica o intercambio seguro de datos."
        };
      }

      if (nativeDatabase.includes(service)) {
        return {
          runModel: "Servicio administrado de base de datos en OCI; Oracle gestiona la plataforma, seguridad base y operacion del servicio.",
          externalModel: "Se puede consumir desde aplicaciones externas mediante conectividad segura, pero no se instala como una pieza autonoma fuera del servicio administrado.",
          architectureNarrative: "La aplicacion accede a la base por red privada o controlada, con secretos en Vault, monitoreo, backups y proteccion de datos sensibles."
        };
      }

      if (openIntegration.includes(service) || category.id === "integration" || category.id === "networking") {
        return {
          runModel: "Servicio administrado de OCI pensado para exponer, conectar o mover trafico entre componentes.",
          externalModel: "Puede integrarse con servicios externos mediante HTTP, eventos, APIs compatibles con Kafka, DNS, VPN, FastConnect, certificados o conectores.",
          architectureNarrative: "El servicio queda en la capa de entrada, integracion o transporte: recibe solicitudes, aplica controles y enruta hacia aplicaciones, datos o servicios externos."
        };
      }

      if (category.id === "ai") {
        return {
          runModel: "Servicio administrado de IA en OCI, conectado a datos, modelos, endpoints y controles de seguridad de la plataforma.",
          externalModel: "Puede integrarse con aplicaciones externas mediante APIs, SDKs, endpoints privados, API Gateway o conectores hacia repositorios de datos.",
          architectureNarrative: "Los usuarios consumen una app o API; la capa de aplicacion consulta datos, genera embeddings o llama modelos; las respuestas se auditan y monitorean en OCI."
        };
      }

      return {
        runModel: "Servicio nativo o administrado de OCI dentro del dominio " + category.title + ".",
        externalModel: "Puede integrarse con sistemas externos cuando se expone por APIs, red privada, eventos, conectores o pipelines de datos; algunas capacidades solo operan como servicio OCI.",
        architectureNarrative: "El servicio se ubica como bloque principal de la solucion y se combina con red, identidad, seguridad, observabilidad y datos para construir una arquitectura completa."
      };
    }

    function renderGrid() {
      const query = $("search").value.trim().toLowerCase();
      const visible = allCategories
        .map((category) => ({
          ...category,
          services: category.services.filter((service) => {
            const details = getDetails(service);
            const text = `${category.title} ${service} ${details.description} ${details.useCase}`.toLowerCase();
            return !query || text.includes(query);
          })
        }))
        .filter((category) => category.services.length);

      $("serviceGrid").innerHTML = visible.length ? visible.map((category) => `
        <article class="category-card" style="--category-color:${category.color}">
          <div class="category-head">
            <div class="category-icon">${category.icon}</div>
            <h2 class="category-title">${category.title}</h2>
          </div>
          <div class="service-list">
            ${category.services.map((service) => `
              <button class="service-button ${service === selectedService ? "active" : ""}" data-service="${escapeHtml(service)}">${service}</button>
            `).join("")}
          </div>
        </article>
      `).join("") : `<div class="empty">No encontré servicios para ese filtro.</div>`;

      document.querySelectorAll(".service-button").forEach((button) => {
        button.addEventListener("click", () => selectService(button.dataset.service));
      });
    }

    function selectService(service) {
      selectedService = service;
      renderDetail(service);
      renderGrid();
      if (window.innerWidth < 1180) $("detailPanel").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function renderDetail(service) {
      const detail = getDetails(service);
      const category = detail.category;
      $("detailPanel").style.setProperty("--active-color", category.color);
      $("detailCategory").textContent = category.title;
      $("detailTitle").textContent = service;
      $("detailDescription").textContent = detail.description;
      $("detailUseCase").textContent = detail.useCase;
      $("runModel").textContent = detail.runModel;
      $("externalModel").textContent = detail.externalModel;
      $("architectureNarrative").textContent = detail.architectureNarrative;
      $("integrationPills").innerHTML = detail.integrations.map((item) => `<span class="pill">${item}</span>`).join("");
      renderMindMap(service, detail.integrations, category.color);
      renderArchitectureFlow(service, detail, category.color);
    }

    function renderArchitectureFlow(service, detail, color) {
      const layers = [
        { label: "Usuarios / Apps externas", x: 9, y: 50, external: true },
        { label: "DNS + WAF", x: 25, y: 27 },
        { label: "Load Balancer / API Gateway", x: 25, y: 73 },
        { label: service, x: 48, y: 50, core: true },
        { label: detail.integrations[0] || "IAM", x: 70, y: 24 },
        { label: detail.integrations[1] || "Vault", x: 70, y: 50 },
        { label: detail.integrations[2] || "Monitoring", x: 70, y: 76 },
        { label: "On-prem / Multicloud", x: 91, y: 50, external: true }
      ];
      const lines = [
        [9, 50, 25, 27, "Entrada segura"],
        [9, 50, 25, 73, "API / trafico"],
        [25, 27, 48, 50, "Proteccion"],
        [25, 73, 48, 50, "Enrutamiento"],
        [48, 50, 70, 24, "Identidad"],
        [48, 50, 70, 50, "Datos"],
        [48, 50, 70, 76, "Monitoreo"],
        [70, 50, 91, 50, "Externo"]
      ];
      const lineHtml = lines.map(([x1, y1, x2, y2, label]) => `
        <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-opacity="0.58" stroke-width="1.6" />
        <text x="${(x1 + x2) / 2}" y="${(y1 + y2) / 2 - 2}" fill="${color}" opacity="0.82" font-size="3.2" text-anchor="middle">${label}</text>
      `).join("");
      const nodeHtml = layers.map((node) => `
        <div class="arch-node ${node.core ? "core" : ""} ${node.external ? "external" : ""}" style="left:${node.x}%; top:${node.y}%">${node.label}</div>
      `).join("");
      $("architectureFlow").innerHTML = `
        <svg viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">${lineHtml}</svg>
        ${nodeHtml}
      `;
    }

    function renderMindMap(service, integrations, color) {
      const width = 340;
      const height = 290;
      const center = { x: width / 2, y: height / 2 };
      const radiusX = 118;
      const radiusY = 94;
      const nodes = integrations.slice(0, 7).map((label, index, list) => {
        const angle = (-90 + (360 / list.length) * index) * Math.PI / 180;
        return {
          label,
          x: center.x + Math.cos(angle) * radiusX,
          y: center.y + Math.sin(angle) * radiusY
        };
      });
      const lines = nodes.map((node) => `<line x1="${center.x}" y1="${center.y}" x2="${node.x}" y2="${node.y}" stroke="${color}" stroke-opacity="0.55" stroke-width="1.5" />`).join("");
      const nodeHtml = nodes.map((node) => `<div class="map-node" style="left:${(node.x / width) * 100}%; top:${(node.y / height) * 100}%">${node.label}</div>`).join("");
      $("mindMap").innerHTML = `
        <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-hidden="true">${lines}</svg>
        <div class="map-node center" style="left:50%; top:50%">${service}</div>
        ${nodeHtml}
      `;
    }

    function renderInnovations() {
      $("innovations").innerHTML = innovations.map(([title, copy]) => `
        <div class="innovation"><strong>${title}</strong>${copy}</div>
      `).join("");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    $("search").addEventListener("input", renderGrid);
    renderGrid();
    renderDetail(selectedService);
    renderInnovations();
  </script>
</body>
</html>
